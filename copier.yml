# CONFIGURATION -------------------------
_min_copier_version: "8"
_subdirectory: project
_templates_suffix: .jinja
_tasks:
  - "git init"
  - "make sync"
  - "make hooks"
  - "git add ."

# PROMPT --------------------------------
project_name:
  type: str
  help: 项目名称

project_description:
  type: str
  help: 项目描述

author_name:
  type: str
  help: 作者名称
  default: "aeins"

author_email:
  type: str
  help: 作者邮箱
  default: "einsone@outlook.com"

year:
  type: str
  help: 版权年份 (LICENSE)
  default: "2026"

project_url:
  type: str
  help: 项目仓库地址 (homepage / repository)
  default: "https://github.com/einsone/{{ project_name|lower|replace('_', '-')|replace(' ', '-') }}"

python_package_distribution_name:
  type: str
  help: 分发包名 (for `pip install NAME`)
  default: "{{ project_name|lower|replace('_', '-')|replace(' ', '-') }}"

python_package_import_name:
  type: str
  help: 导入包名 (for `import NAME` in Python code)
  default: "{{ project_name|lower|replace('-', '_')|replace(' ', '_') }}"

python_package_command_line_name:
  type: str
  help: 可执行命令名称 (for use in the shell)
  default: "{{ project_name|lower|replace('_', '-')|replace(' ', '-') }}"
