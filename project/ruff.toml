force-exclude = true
indent-width  = 4
line-length   = 180
src           = ["src"]

[format]
    docstring-code-format      = true
    docstring-code-line-length = "dynamic"
    indent-style               = "space"
    line-ending                = "lf"
    quote-style                = "double"
    skip-magic-trailing-comma  = false

[lint]
    dummy-variable-rgx = "^_$"
    ignore = [
        "D104",   # undocumented-public-package —— 不强制 __init__.py（包）写 docstring
        "D107",   # undocumented-public-init —— 不强制 __init__ 方法写 docstring
        "D206",   # docstring-tab-indentation —— 缩进交由 formatter 处理
        "D300",   # triple-single-quotes —— 引号交由 formatter 处理
        "D415",   # ends-in-punctuation —— 中文句号「。」不被识别为合法结尾标点，本项目文档用中文
        "E111",   # indentation-with-invalid-multiple —— 缩进交由 formatter 处理
        "E114",   # indentation-with-invalid-multiple-comment —— 缩进交由 formatter 处理
        "E117",   # over-indented —— 缩进交由 formatter 处理
        "RUF001", # ambiguous-unicode-string —— 中文全角标点（，（）等）属正常用字，本项目文档用中文
        "RUF002", # ambiguous-unicode-docstring —— 同上，docstring 中文标点
        "RUF003", # ambiguous-unicode-comment —— 同上，注释中文标点
        "W191",   # tab-indentation —— 缩进交由 formatter 处理
    ]
    select = [
        "A",    # flake8-builtins —— 禁止遮蔽 Python 内建名（如 id、type、list）
        "B",    # flake8-bugbear —— 常见 bug 与设计缺陷（如可变默认参数）
        "C4",   # flake8-comprehensions —— 推导式写法优化
        "C90",  # mccabe —— 圈复杂度检查
        "D",    # pydocstyle —— 文档字符串规范
        "E",    # pycodestyle errors —— PEP 8 代码风格错误
        "F",    # Pyflakes —— 逻辑错误（未用导入、未定义名等）
        "FURB", # refurb —— 现代化、更地道的写法
        "G",    # flake8-logging-format —— 日志格式化规范
        "I",    # isort —— import 排序
        "INP",  # flake8-no-pep420 —— 禁止隐式命名空间包（缺 __init__.py）
        "LOG",  # flake8-logging —— logging 模块使用陷阱
        "N",    # pep8-naming —— PEP 8 命名规范
        "PGH",  # pygrep-hooks —— 杂项检查（如禁止裸 type: ignore）
        "PIE",  # flake8-pie —— 杂项代码简化
        "PT",   # flake8-pytest-style —— pytest 测试写法规范
        "PTH",  # flake8-use-pathlib —— 优先使用 pathlib 而非 os.path
        "RUF",  # Ruff-specific rules —— Ruff 自有规则
        "S",    # flake8-bandit —— 安全漏洞检查
        "SIM",  # flake8-simplify —— 代码可简化之处
        "T10",  # flake8-debugger —— 禁止遗留调试器语句（breakpoint、pdb）
        "T20",  # flake8-print —— 禁止 print/pprint（库代码不应有）
        "TC",   # flake8-type-checking —— 仅类型用的 import 移入 TYPE_CHECKING
        "UP",   # pyupgrade —— 升级到更新的 Python 语法
        "W",    # pycodestyle warnings —— PEP 8 代码风格警告
    ]

[lint.pydocstyle]
    convention = "google"

[lint.mccabe]
    max-complexity = 10

[lint.per-file-ignores]
    "tests/**" = [
        "D",    # pydocstyle —— 测试代码无需文档字符串
        "S101", # assert —— 测试中允许使用 assert
    ]
